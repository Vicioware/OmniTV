name: Full Master Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      workers:
        description: "Workers paralelos (2-4 recomendado en Actions)"
        required: false
        default: "3"
      sample:
        description: "Segundos de muestreo FFmpeg por canal"
        required: false
        default: "12"

permissions:
  contents: write

concurrency:
  group: iptv-master-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Listas grandes: FFmpeg real puede tardar horas
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar FFmpeg reciente con extension_picky
        shell: bash
        run: |
          set -euo pipefail

          FFMPEG_URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          INSTALL_DIR="$RUNNER_TEMP/ffmpeg"

          echo "Descargando: $FFMPEG_URL"
          curl --fail --location --retry 3 --retry-delay 3 \
            --output "$RUNNER_TEMP/ffmpeg.tar.xz" \
            "$FFMPEG_URL"

          mkdir -p "$INSTALL_DIR"
          tar -xJf "$RUNNER_TEMP/ffmpeg.tar.xz" \
            --directory "$INSTALL_DIR" \
            --strip-components=1

          chmod +x "$INSTALL_DIR/bin/ffmpeg" "$INSTALL_DIR/bin/ffprobe"

          # Disponible para todos los steps posteriores del job.
          echo "$INSTALL_DIR/bin" >> "$GITHUB_PATH"

      - name: Verificar FFmpeg y extension_picky
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Ejecutable usado ==="
          which ffmpeg

          echo "=== Versión ==="
          ffmpeg -version | head -n 5

          echo "=== Validación extension_picky ==="
          if ! ffmpeg -hide_banner -h demuxer=hls 2>&1 | grep -q "extension_picky"; then
            echo "::error::El FFmpeg instalado no dispone de extension_picky."
            exit 1
          fi

          echo "OK: extension_picky está disponible"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          fi

      - name: Paso 1 - Limpiar maestra
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          PYTHONUNBUFFERED: "1"
        working-directory: scripts
        run: |
          mkdir -p ../reports

          python clean_master.py \
            --master ../data/master.m3u \
            --workers "${{ inputs.workers || '3' }}" \
            --sample "${{ inputs.sample || '12' }}" \
            --first-ok-output ../reports/master_alive_first_pass.m3u \
            --first-fail-output ../reports/master_dead_first_pass.m3u \
            --first-report-output ../reports/master_check_first_pass.csv \
            --ok-output ../reports/master_alive_final.m3u \
            --fail-output ../reports/master_dead_final.m3u \
            --report-output ../reports/master_check_final.csv

      - name: Paso 2 - Merge fuentes
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          PYTHONUNBUFFERED: "1"
        working-directory: scripts
        run: |
          python merge_sources.py \
            --master ../data/master.m3u \
            --sources ../data/source_playlists.txt \
            --workers "${{ github.event.inputs.workers || '3' }}" \
            --sample "${{ github.event.inputs.sample || '12' }}"

      - name: Paso 3 - Enriquecer metadata
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          PYTHONUNBUFFERED: "1"
        working-directory: scripts
        run: |
          python enrich_metadata.py --master ../data/master.m3u

      - name: Guardar playlist final como reporte
        run: |
          mkdir -p reports
          cp data/master.m3u reports/master_final.m3u

      - name: Subir reportes de la ejecución
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iptv-report-${{ github.run_number }}
          path: reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit y push
        run: |
          git config user.name "iptv-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/master.m3u
          # no commitear master_fail_last salvo que lo quieras versionar
          if git diff --staged --quiet; then
            echo "Sin cambios en master.m3u"
          else
            git commit -m "chore(iptv): full update master playlist [skip ci]"
            git push
          fi