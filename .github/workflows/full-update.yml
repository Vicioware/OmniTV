name: Full Master Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      workers:
        description: "Workers paralelos (2-4 recomendado en Actions)"
        required: false
        default: "3"
      sample:
        description: "Segundos de muestreo FFmpeg por canal"
        required: false
        default: "12"

permissions:
  contents: write

concurrency:
  group: iptv-master-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Listas grandes: FFmpeg real puede tardar horas
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup FFmpeg (con extension_picky)
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          # "release" = última estable; o fija p.ej. "7.0.2" / "6.1.1"
          ffmpeg-version: release
          architecture: x64
          linking-type: static
          github-token: ${{ github.token }}

      - name: Verificar FFmpeg y extension_picky
        run: |
          set -euo pipefail
          echo "=== ffmpeg -version ==="
          ffmpeg -version | head -n 5
          echo "=== which ffmpeg ==="
          which ffmpeg

          # Debe existir la opción (FFmpeg >= 6.1)
          if ! ffmpeg -h full 2>&1 | grep -q "extension_picky"; then
            echo "::error::FFmpeg no expone -extension_picky. Abortando."
            ffmpeg -h full 2>&1 | grep -i extension || true
            exit 1
          fi

          echo "OK: extension_picky disponible"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          fi

      - name: Paso 1 - Limpiar maestra
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          PYTHONUNBUFFERED: "1"
        working-directory: scripts
        run: |
          python clean_master.py \
            --master ../data/master.m3u \
            --workers "${{ github.event.inputs.workers || '3' }}" \
            --sample "${{ github.event.inputs.sample || '12' }}"

      - name: Paso 2 - Merge fuentes
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          PYTHONUNBUFFERED: "1"
        working-directory: scripts
        run: |
          python merge_sources.py \
            --master ../data/master.m3u \
            --sources ../data/source_playlists.txt \
            --workers "${{ github.event.inputs.workers || '3' }}" \
            --sample "${{ github.event.inputs.sample || '12' }}"

      - name: Paso 3 - Enriquecer metadata
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          PYTHONUNBUFFERED: "1"
        working-directory: scripts
        run: |
          python enrich_metadata.py --master ../data/master.m3u

      - name: Upload reportes de fallos (artefacto)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iptv-fail-reports
          path: |
            data/master_fail_last.m3u
          if-no-files-found: ignore

      - name: Commit y push
        run: |
          git config user.name "iptv-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/master.m3u
          # no commitear master_fail_last salvo que lo quieras versionar
          if git diff --staged --quiet; then
            echo "Sin cambios en master.m3u"
          else
            git commit -m "chore(iptv): full update master playlist [skip ci]"
            git push
          fi