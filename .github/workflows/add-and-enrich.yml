name: Add Sources And Enrich

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      workers:
        description: "Workers paralelos"
        required: false
        default: "3"
      sample:
        description: "Segundos de muestreo FFmpeg"
        required: false
        default: "12"

permissions:
  contents: write

concurrency:
  group: iptv-master-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 2

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          fi

      # Sin clean_master.py a propósito

      - name: Merge fuentes
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          PYTHONUNBUFFERED: "1"
        working-directory: scripts
        run: |
          python merge_sources.py \
            --master ../data/master.m3u \
            --sources ../data/source_playlists.txt \
            --workers "${{ github.event.inputs.workers || '3' }}" \
            --sample "${{ github.event.inputs.sample || '12' }}"

      - name: Enriquecer metadata
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          PYTHONUNBUFFERED: "1"
        working-directory: scripts
        run: |
          python enrich_metadata.py --master ../data/master.m3u

      - name: Commit y push
        run: |
          git config user.name "iptv-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/master.m3u
          if git diff --staged --quiet; then
            echo "Sin cambios en master.m3u"
          else
            git commit -m "chore(iptv): add sources + enrich [skip ci]"
            git push
          fi